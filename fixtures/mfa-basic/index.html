<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Two-factor verification - LoginGuard Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      main {
        max-width: 430px;
        margin: 64px auto;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-top: 16px;
        font-weight: 700;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px;
      }

      button {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Two-factor authentication</h1>
      <p>Enter the verification code from your authenticator app. This local fixture does not verify codes.</p>

      <form action="#" method="get">
        <label for="verification-code">Verification code</label>
        <input id="verification-code" name="verification_code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="123456">

        <button type="submit">Verify code</button>
      </form>
    </main>
  </body>
</html>
