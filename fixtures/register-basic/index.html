<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account - LoginGuard Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      main {
        max-width: 460px;
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-top: 14px;
        font-weight: 700;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px;
      }

      button {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Create account</h1>
      <p>Safe local fixture for registration-page classification.</p>

      <form action="#" method="get">
        <label for="full-name">Full name</label>
        <input id="full-name" name="full_name" type="text" autocomplete="name" placeholder="Alex Example">

        <label for="register-email">Email address</label>
        <input id="register-email" name="email" type="email" autocomplete="email" placeholder="name@example.test">

        <label for="register-password">Password</label>
        <input id="register-password" name="password" type="password" autocomplete="new-password" placeholder="Create a password">

        <label for="confirm-password">Confirm password</label>
        <input id="confirm-password" name="confirm_password" type="password" autocomplete="new-password" placeholder="Confirm password">

        <button type="submit">Create account</button>
      </form>
    </main>
  </body>
</html>
