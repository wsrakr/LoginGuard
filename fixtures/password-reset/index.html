<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password - LoginGuard Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      main {
        max-width: 430px;
        margin: 64px auto;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-top: 16px;
        font-weight: 700;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px;
      }

      button {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reset password</h1>
      <p>Enter an email address to request password reset instructions. This fixture does not send email.</p>

      <form action="#" method="get">
        <label for="reset-email">Email address</label>
        <input id="reset-email" name="email" type="email" autocomplete="email" placeholder="name@example.test">

        <button type="submit">Reset password</button>
      </form>
    </main>
  </body>
</html>
