<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoginGuard Fixture - SPA Login</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      .app-shell {
        max-width: 440px;
        margin: 64px auto;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }

      .field {
        margin-top: 16px;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        font-weight: 700;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px;
      }

      button {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main class="app-shell" data-testid="login-panel">
      <h1>Log in to workspace</h1>
      <p>Safe local fixture that resembles a client-rendered login component.</p>

      <section aria-label="Login panel">
        <div class="field">
          <label for="username">Username or email</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="user@example.test">
        </div>

        <div class="field">
          <label for="spa-password">Password</label>
          <input id="spa-password" name="password" type="password" autocomplete="current-password" placeholder="Password">
        </div>

        <button type="button">Continue</button>
      </section>
    </main>
  </body>
</html>
