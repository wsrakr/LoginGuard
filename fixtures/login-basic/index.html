<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoginGuard Fixture - Basic Login</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f8fb;
        color: #172033;
      }

      main {
        max-width: 420px;
        margin: 64px auto;
        padding: 24px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
      }

      label,
      input,
      button {
        display: block;
        width: 100%;
      }

      label {
        margin-top: 16px;
        font-weight: 700;
      }

      input,
      button {
        box-sizing: border-box;
        margin-top: 6px;
        padding: 10px;
      }

      button {
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sign in</h1>
      <p>Safe local fixture for basic login detection.</p>

      <form action="#" method="get">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="username" placeholder="name@example.test">

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password">

        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
